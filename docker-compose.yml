services:
  # 1. Database - MongoDB
  mongodb:
    image: mongo:7.0
    container_name: mongodb_prod
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chat-network

  # 2. Caching & Socket Adapter - Redis
  redis:
    image: redis:alpine
    container_name: redis_prod
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat-network

  # 3. Backend - ExpressJS
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat-network

  # 4. Frontend - NextJS
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5173/api
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_SOCKET_URL=http://localhost:5173
    restart: always
    networks:
      - chat-network

  # 5. Load Balancer - Nginx
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_lb
    restart: always
    ports:
      - "5173:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge

volumes:
  mongo_data:
